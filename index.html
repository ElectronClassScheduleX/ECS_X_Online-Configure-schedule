<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程表配置编辑器</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="fluent-backdrop" aria-hidden="true">
        <div class="mesh mesh-a"></div>
        <div class="mesh mesh-b"></div>
        <div class="mesh mesh-c"></div>
    </div>

    <a href="https://github.com/Enigfrank" target="_blank" class="github-corner" aria-label="View source on GitHub">
        <svg width="80" height="80" viewBox="0 0 250 250" aria-hidden="true">
            <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
            <path class="octo-arm"
                d="M128.3,109 C113.8,99.7 119,89.6 119,89.6 C122,82.7 120.5,78.6 120.5,78.6 C119.2,72 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2"
                fill="currentColor"></path>
            <path class="octo-body"
                d="M115,115 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88 127.5,74.4 143.8,58 C148.5,53.4 154,51.2 159.7,51 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96 205.4,96.6 C205.1,102.4 203,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z"
                fill="currentColor"></path>
        </svg>
    </a>

    <main class="app-shell">
        <header class="app-header panel">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <rect x="3" y="3" width="18" height="18" rx="4"></rect>
                        <line x1="8" y1="12" x2="16" y2="12"></line>
                        <line x1="12" y1="8" x2="12" y2="16"></line>
                    </svg>
                </div>
                <div>
                    <h1>课程表配置编辑器</h1>
                </div>
            </div>
            <div class="toolbar">
                <input class="hidden-input" type="file" id="fileInput" accept=".js">
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">上传 JS 文件</button>
                <button class="btn btn-success" onclick="exportConfig()">导出配置</button>
                <button class="btn btn-warning" onclick="resetConfig()">重置</button>
            </div>
        </header>

        <div class="app-main">
            <aside class="nav-rail panel">
                <ul class="nav-list">
                    <li data-tab="basic" class="nav-item active"><span>基础设置</span></li>
                    <li data-tab="subjects" class="nav-item"><span>科目名称</span></li>
                    <li data-tab="timetable" class="nav-item"><span>时间表</span></li>
                    <li data-tab="daily" class="nav-item"><span>每日课表</span></li>
                    <li data-tab="divider" class="nav-item"><span>分隔线</span></li>
                    <li data-tab="style" class="nav-item"><span>样式配置</span></li>
                </ul>
            </aside>

            <section class="workspace">
                <div class="workspace-head panel">
                    <h2 id="activeSectionTitle">基础设置</h2>
                    <p id="activeSectionDesc">管理倒计时和星期显示等基础属性。</p>
                </div>

                <div id="basic" class="tab-content active">
                    <section class="panel section-card">
                        <h3>基础设置</h3>
                        <div class="form-group">
                            <label for="countdown_target" class="form-label">倒计时目标</label>
                            <input type="text" id="countdown_target" placeholder="YYYY-MM-DD 或 hidden">
                        </div>
                        <div class="form-group inline-control" id="weekDisplayGroup">
                            <label for="week_display" class="form-label">显示星期</label>
                            <div class="toggle-switch">
                                <input type="checkbox" id="week_display">
                                <label for="week_display" class="toggle-slider"></label>
                            </div>
                        </div>
                    </section>
                </div>

                <div id="subjects" class="tab-content">
                    <section class="panel section-card">
                        <div class="section-head">
                            <h3>科目名称配置</h3>
                            <button class="btn btn-primary btn-sm" onclick="addSubjectRow()">添加科目</button>
                        </div>
                        <div class="table-container">
                            <table id="subjectsTable">
                                <thead>
                                    <tr>
                                        <th>科目简写</th>
                                        <th>科目全称</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </section>
                </div>

                <div id="timetable" class="tab-content">
                    <section class="panel section-card">
                        <h3>时间表配置</h3>
                        <div class="control-row">
                            <select id="timetableDay" onchange="loadTimetableDay()">
                                <option value="">请选择或添加时间表类型</option>
                            </select>
                            <button class="btn btn-success btn-sm" onclick="addNewTimetableType()">添加新类型</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteTimetableDay()">删除此类型</button>
                        </div>
                        <div class="control-row">
                            <button class="btn btn-primary btn-sm" onclick="addTimetableRow()">添加时间段</button>
                            <button class="btn btn-success btn-sm" onclick="saveTimetableToConfig()">保存当前时间表</button>
                        </div>
                        <div class="table-container">
                            <table id="timetableTable">
                                <thead>
                                    <tr>
                                        <th>时间段</th>
                                        <th>内容</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </section>
                </div>

                <div id="daily" class="tab-content">
                    <section class="panel section-card">
                        <h3>每日课表配置</h3>
                        <div id="dailyClasses"></div>
                    </section>
                </div>

                <div id="divider" class="tab-content">
                    <section class="panel section-card">
                        <h3>分隔线配置</h3>
                        <div class="control-row">
                            <select id="dividerDay" onchange="loadDividerDay()">
                                <option value="">请选择或添加分隔线类型</option>
                            </select>
                            <button class="btn btn-success btn-sm" onclick="addNewDividerType()">添加新类型</button>
                        </div>
                        <div id="dividerInputs">
                            <div class="empty-state">
                                <p>请先选择或添加分隔线类型</p>
                            </div>
                        </div>
                    </section>
                </div>

                <div id="style" class="tab-content">
                    <section class="panel section-card">
                        <h3>样式配置</h3>
                        <div class="table-container">
                            <table id="styleTable">
                                <thead>
                                    <tr>
                                        <th>CSS 变量</th>
                                        <th>值</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </section>
                </div>
            </section>
        </div>
    </main>

    <script src="parser.js"></script>
    <script src="script.js"></script>
</body>

</html>
